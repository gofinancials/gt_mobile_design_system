name: Deploy Widgetbook to GitHub Pages

on:
  push:
    tags:
      - "v*"
  pull_request:
    branches:
      - main
    types: [closed]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'pull_request' &&
      github.event.pull_request.state == 'closed' &&
      github.event.pull_request.merged == true) ||
      (github.event_name == 'push' && github.ref_type == 'tag')
    permissions:
      contents: write # Required for publishing to gh-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: false
          flutter-version: "3.41.6"

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Widgetbook
        run: cd gallery && dart run build_runner build -d && flutter build web --no-wasm --target lib/main.dart --base-href "/${{ github.event.repository.name }}/"

      - name: Build Docs
        run: pwd && dart doc --output=gallery/build/web/api

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: gallery/build/web # The folder where flutter builds the web files
          branch: gh-pages # The branch the action should deploy to
          clean: true
