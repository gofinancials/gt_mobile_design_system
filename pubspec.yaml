name: gt_mobile_ui
description: "A new Flutter package project."
version: 0.0.1
homepage:
publish_to: none

environment:
  sdk: ">=3.2.0 <=5.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.2
  cached_network_image: ^3.3.0
  vector_graphics: ^1.1.19
  provider: ^6.0.3
  shimmer: ^3.0.0
  styled_text:
    git:
      url: https://github.com/dirisujesse/styled_text_package.git
      path: styled_text
      ref: master
  lottie: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.0.0
  vector_graphics_compiler: ^1.1.19

flutter:
  uses-material-design: true

  assets:
    - assets/images/raster/
    - path: assets/images/vector/
      transformers:
        - package: vector_graphics_compiler
